[project]
name = "meshplay-client"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "meshplay-core",
    "libtorrent>=2.0.13",
    "typer>=0.12",
]

[project.scripts]
meshplay-client = "meshplay_client.cli:app"

[tool.uv.sources]
meshplay-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/meshplay_client"]
