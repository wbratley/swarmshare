[project]
name = "meshplay-integration"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "meshplay-core",
    "meshplay-publisher",
    "libtorrent>=2.0.13",
    "pytest>=8.3",
]

[tool.uv.sources]
meshplay-core = { workspace = true }
meshplay-publisher = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/meshplay_integration"]
